services:
  - type: web
    name: launch-studio
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: launch-studio-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/data.db
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
